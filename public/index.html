<!DOCTYPE html>
<html>
<head>
<title>AgroBridge Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f4f7f9;}

.login-page{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#2e7d32,#1b5e20);
}
.login-card{
background:white;padding:40px;width:360px;border-radius:20px;
box-shadow:0 30px 60px rgba(0,0,0,0.3);text-align:center;
}
.login-card h1{color:#1b5e20;margin-bottom:20px;}
.login-card input,.login-card select{
width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;
}
.login-card button{
width:100%;padding:12px;border:none;border-radius:12px;
background:#2e7d32;color:white;font-weight:600;cursor:pointer;
}

.dashboard{display:none;height:100vh;}
.dashboard.active{display:flex;}

.sidebar{
width:220px;background:#1b5e20;color:white;padding:30px 20px;
}
.sidebar h2{margin-bottom:30px;}
.sidebar button{
display:block;width:100%;margin-bottom:15px;padding:10px;
border:none;border-radius:8px;background:#2e7d32;color:white;cursor:pointer;
}

.main{flex:1;padding:40px;overflow-y:auto;}

.card{
background:white;padding:20px;margin:15px 0;border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

button.action{
background:#2e7d32;color:white;border:none;padding:8px 14px;
border-radius:20px;cursor:pointer;
}

.hidden{display:none;}

#cartBox{
position:fixed;right:20px;top:20px;background:white;padding:20px;
border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:280px;display:none;
}
#cartBox input{width:100%;margin:5px 0;padding:6px;border-radius:6px;border:1px solid #ccc;}
</style>
</head>

<body>

<div class="login-page" id="loginPage">
<div class="login-card">
<h1>AgroBridge</h1>
<input id="username" placeholder="Enter Name">
<select id="role">
<option value="">Select Role</option>
<option value="farmer">Farmer</option>
<option value="importer">Importer</option>
</select>
<button onclick="login()">Enter Marketplace</button>
</div>
</div>

<div class="dashboard" id="dashboard">

<div class="sidebar">
<h2>AgroBridge</h2>
<button onclick="showSection('home')">Home</button>
<button id="farmerBtn" onclick="showSection('farmer')" class="hidden">Add Crop</button>
<button onclick="showSection('orders')">Orders</button>
<button id="revenueBtn" onclick="showSection('revenue')" class="hidden">Revenue</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<h2 id="welcome"></h2>

<div id="homeSection">
<h3>Available Crops</h3>
<div id="cropList"></div>
</div>

<div id="farmerSection" class="hidden">
<h3>Add Crop</h3>
<input id="name" placeholder="Crop Name">
<input id="weight" placeholder="Weight">
<input id="price" placeholder="Price">
<button class="action" onclick="addCrop()">Add Crop</button>
</div>

<div id="ordersSection" class="hidden">
<h3 id="ordersTitle">Orders</h3>
<div id="orderList"></div>
</div>

<div id="revenueSection" class="hidden">
<h3>Revenue Dashboard</h3>
<div id="revenueBox"></div>
</div>

</div>
</div>

<div id="cartBox">
<h3>Cart (Max 10)</h3>
<div id="cartItems"></div>
<p><strong>Total:</strong> ₹<span id="cartTotal">0</span></p>

<h4>Delivery Address</h4>
<input id="house" placeholder="House / Apartment No">
<input id="area" placeholder="Area / Street">
<input id="landmark" placeholder="Landmark">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="pincode" placeholder="Pincode (6 digits)">
<input id="phone" placeholder="Phone (10 digits)">

<button onclick="checkout()">Checkout</button>
</div>

<script>

let currentUser=null;
let currentName=null;
let cart=[];
let total=0;

function login(){
currentName=document.getElementById("username").value.trim();
currentUser=document.getElementById("role").value;

if(!currentName||!currentUser){alert("Fill details");return;}

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").classList.add("active");
document.getElementById("welcome").innerText="Welcome "+currentName;
if(currentUser === "farmer"){
    document.getElementById("farmerBtn").style.display = "block";
    document.getElementById("revenueBtn").style.display = "block";
    document.getElementById("ordersTitle").innerText="My Product Orders";
    document.getElementById("cartBox").style.display="none";
}else{
    document.getElementById("farmerBtn").style.display = "none";
    document.getElementById("revenueBtn").style.display = "none";
    document.getElementById("ordersTitle").innerText="My Orders";
    document.getElementById("cartBox").style.display="block";
}


showSection("home");
loadCrops();
loadOrders();
if(currentUser==="farmer") loadRevenue();
}

function logout(){location.reload();}

function showSection(section){
["homeSection","farmerSection","ordersSection","revenueSection"]
.forEach(id=>document.getElementById(id).classList.add("hidden"));

if(section==="home") document.getElementById("homeSection").classList.remove("hidden");
if(section==="farmer" && currentUser==="farmer")
document.getElementById("farmerSection").classList.remove("hidden");
if(section==="orders") document.getElementById("ordersSection").classList.remove("hidden");
if(section==="revenue" && currentUser==="farmer")
document.getElementById("revenueSection").classList.remove("hidden");
}

function addCrop(){
const name=document.getElementById("name").value.trim();
const weight=document.getElementById("weight").value.trim();
const price=document.getElementById("price").value.trim();

if(!name||!weight||!price){alert("All fields required");return;}

fetch('/add-crop',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({farmer:currentName,name,weight,price})
})
.then(res=>res.json())
.then(data=>{alert(data.message);loadCrops();});
}

function loadCrops(){
fetch('/crops')
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(c=>{
html+=`
<div class="card">
<h4>${c.name}</h4>
<p>Farmer: ${c.farmer}</p>
<p>Stock: ${c.weight}</p>
<p>Price: ₹${c.price}</p>
${currentUser==="importer"
? `<button class="action" onclick="addToCart(${c.id},'${c.name}',${c.price})">Add to Cart</button>`
: (currentUser==="farmer" && c.farmer===currentName)
? `<button class="action" onclick="deleteCrop(${c.id})">Delete Crop</button>`
: ""
}



</div>`;
});
document.getElementById("cropList").innerHTML=html;
});
}

function addToCart(id,name,price){
if(cart.length>=10){alert("Cart limit 10");return;}
cart.push({cropId:id,name,quantity:1,price});
total+=price;
renderCart();
}

function renderCart(){
let html="";
cart.forEach(item=>{
html+=`<p>${item.name} x${item.quantity} - ₹${item.price}</p>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartTotal").innerText=total;
}

function checkout(){
const house=document.getElementById("house").value.trim();
const area=document.getElementById("area").value.trim();
const district=document.getElementById("district").value.trim();
const state=document.getElementById("state").value.trim();
const pincode=document.getElementById("pincode").value.trim();
const phone=document.getElementById("phone").value.trim();

if(!house||!area||!district||!state){alert("Complete address required");return;}
if(!/^\d{6}$/.test(pincode)){alert("Pincode must be 6 digits");return;}
if(!/^\d{10}$/.test(phone)){alert("Phone must be 10 digits");return;}

fetch('/checkout',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
importer:currentName,
cart,
address:{house,area,district,state,pincode,phone}
})
})
.then(res=>res.json())
.then(data=>{
alert("Grand Total ₹"+data.grandTotal);
cart=[];total=0;
renderCart();
loadOrders();
loadCrops();
});
}

function loadOrders(){
fetch('/orders')
.then(res=>res.json())
.then(data=>{

data.sort((a,b)=>new Date(b.date)-new Date(a.date));

let html="";
data.forEach((o,i)=>{

if(currentUser==="farmer" && o.farmer!==currentName) return;
if(currentUser==="importer" && o.importer!==currentName) return;

html+=`
<div class="card">
<h4>${o.crop}</h4>
<p>Farmer: ${o.farmer}</p>
<p>Quantity: ${o.quantity}</p>
<p>Status: ${o.tracking}</p>
<p>Date: ${new Date(o.date).toLocaleString()}</p>

${currentUser==="importer" && o.tracking==="Delivered" && !o.rating ? `
<div>
<span onclick="rateOrder(${i},1)">⭐</span>
<span onclick="rateOrder(${i},2)">⭐</span>
<span onclick="rateOrder(${i},3)">⭐</span>
<span onclick="rateOrder(${i},4)">⭐</span>
<span onclick="rateOrder(${i},5)">⭐</span>
</div>`:""}

${o.rating?`<p>Rating: ${"⭐".repeat(o.rating)}</p>`:""}

${currentUser==="farmer"?`
<select onchange="updateStatus(${i},this.value)">
<option>Preparing</option>
<option>Shipped</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>`:""}
</div>`;
});
document.getElementById("orderList").innerHTML=html;
});
}

function updateStatus(index,status){
fetch('/update-status/'+index,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status})
}).then(()=>loadOrders());
}

function rateOrder(index,stars){
fetch('/rate/'+index,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({rating:stars})
}).then(()=>loadOrders());
}

function loadRevenue(){
if(currentUser!=="farmer") return;

fetch('/revenue/'+currentName)
.then(res=>res.json())
.then(data=>{
document.getElementById("revenueBox").innerHTML=
`<div class="card">
<p>Total Orders: ${data.totalOrders}</p>
<p>Total Revenue: ₹${data.revenue}</p>
</div>`;
});
}
function deleteCrop(id){
    if(!confirm("Are you sure you want to delete this crop?")) return;

    fetch('/delete-crop/'+id,{
        method:'POST'
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadCrops();
    });
}
</script>
</body>
</html>
