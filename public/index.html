<!DOCTYPE html>
<html>
<head>
<title>AgroBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
min-height:100vh;
color:#222;
}

.navbar{
background:#1b5e20;
color:white;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.navbar h2{
font-weight:600;
}

.navbar button{
background:white;
color:#1b5e20;
border:none;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-weight:500;
}

.auth-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.auth-card{
background:white;
padding:45px;
width:380px;
border-radius:25px;
box-shadow:0 30px 70px rgba(0,0,0,0.15);
text-align:center;
}

.auth-card h1{
margin-bottom:25px;
color:#1b5e20;
}

.auth-card input,
.auth-card select{
width:100%;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #ddd;
}

.auth-card button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2e7d32;
color:white;
font-weight:600;
cursor:pointer;
}

.dashboard{
display:none;
padding:50px 70px;
}

.section{
margin-top:40px;
}

input{
padding:12px;
margin:8px 5px;
border-radius:10px;
border:1px solid #ccc;
}

button.action{
background:#2e7d32;
color:white;
border:none;
padding:10px 18px;
border-radius:25px;
cursor:pointer;
}

button.delete{
background:#c62828;
color:white;
border:none;
padding:8px 16px;
border-radius:25px;
cursor:pointer;
}

#cropList{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.stars span{
cursor:pointer;
font-size:20px;
}

#popup{
position:fixed;
top:25px;
right:25px;
background:#2e7d32;
color:white;
padding:15px 25px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<div id="popup"></div>

<div id="authPage" class="auth-container">
<div class="auth-card">
<h1>AgroBridge</h1>
<input id="username" placeholder="Enter Your Name">
<select id="roleSelect">
<option value="">Select Role</option>
<option value="farmer">Farmer</option>
<option value="importer">Importer</option>
</select>
<button onclick="login()">Enter Marketplace</button>
</div>
</div>

<div id="dashboard" class="dashboard">

<div class="navbar">
<h2>AgroBridge Marketplace</h2>
<button onclick="logout()">Logout</button>
</div>

<div id="farmerSection" class="section" style="display:none;">
<h3>Add Crop</h3>
<input id="name" placeholder="Crop Name">
<input id="weight" placeholder="Weight (kg)">
<input id="price" placeholder="Price per kg">
<button class="action" onclick="addCrop()">Add Crop</button>
</div>

<div class="section">
<h3>Available Crops</h3>
<div id="cropList"></div>
</div>

<div id="orderForm" style="display:none;">
<h3>Place Order</h3>
<p id="selectedCrop"></p>
<input id="quantity" placeholder="Quantity (kg)">
<input id="house" placeholder="House">
<input id="area" placeholder="Area">
<input id="street" placeholder="Street">
<input id="landmark" placeholder="Landmark">
<input id="pincode" placeholder="Pincode">
<input id="phone" placeholder="Phone">
<button class="action" onclick="confirmOrder()">Confirm Order</button>
</div>

<div class="section">
<h3>Orders</h3>
<select id="sortSelect" onchange="loadOrders()">
<option value="newest">Newest First</option>
<option value="oldest">Oldest First</option>
</select>
<div id="orderList"></div>
</div>

</div>

<script>

let currentUser=null;
let currentName=null;
let selectedCropId=null;
let selectedCropName=null;

function showPopup(msg){
const popup=document.getElementById("popup");
popup.innerText=msg;
popup.style.display="block";
setTimeout(()=>popup.style.display="none",3000);
}

function login(){
const name=document.getElementById("username").value.trim();
const role=document.getElementById("roleSelect").value;
if(!name||!role){showPopup("Fill all fields");return;}
currentUser=role;
currentName=name;
document.getElementById("authPage").style.display="none";
document.getElementById("dashboard").style.display="block";
if(role==="farmer"){
document.getElementById("farmerSection").style.display="block";
}
loadCrops();
loadOrders();
}

function logout(){location.reload();}

function addCrop(){
const name=document.getElementById("name").value;
const weight=document.getElementById("weight").value;
const price=document.getElementById("price").value;
if(!name||!weight||!price){showPopup("Fill all fields");return;}
fetch('/add-crop',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({farmer:currentName,name,weight,price})
})
.then(res=>res.json())
.then(data=>{showPopup(data.message);loadCrops();});
}

function deleteCrop(id){
fetch('/delete-crop/'+id,{method:'POST'})
.then(()=>{loadCrops();loadOrders();});
}

function loadCrops(){
fetch('/crops')
.then(res=>res.json())
.then(data=>{
const list=document.getElementById("cropList");
list.innerHTML="";
data.forEach((crop)=>{
list.innerHTML+=`
<div class="card">
<h3>${crop.name}</h3>
<p>Farmer: ${crop.farmer}</p>
<p>Weight Left: ${crop.weight} kg</p>
<p>Price: ₹${crop.price}</p>
${currentUser==="importer"?`<button class="action" onclick="showOrderForm(${crop.id},'${crop.name}')">Buy</button>`:""}
${currentUser==="farmer" && crop.farmer===currentName?`<button class="delete" onclick="deleteCrop(${crop.id})">Delete</button>`:""}
</div>`;
});
});
}

function showOrderForm(id,name){
selectedCropId=id;
selectedCropName=name;
document.getElementById("selectedCrop").innerText="Crop: "+name;
document.getElementById("orderForm").style.display="block";
}

function confirmOrder(){
const quantity=Number(document.getElementById("quantity").value);
const house=document.getElementById("house").value;
const pincode=document.getElementById("pincode").value;
const phone=document.getElementById("phone").value;

if(!quantity||quantity<=0){showPopup("Enter valid quantity");return;}
if(!house){showPopup("House required");return;}
if(!/^\d{6}$/.test(pincode)){showPopup("Pincode must be 6 digits");return;}
if(!/^\d{10}$/.test(phone)){showPopup("Phone must be 10 digits");return;}

fetch('/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
cropId:selectedCropId,
importer:currentName,
quantity,
house,
area:document.getElementById("area").value,
street:document.getElementById("street").value,
landmark:document.getElementById("landmark").value,
pincode,
phone
})
})
.then(res=>res.json())
.then(data=>{
showPopup(data.message);
document.getElementById("orderForm").style.display="none";
loadOrders();
loadCrops();
});
}

function loadOrders(){
fetch('/orders')
.then(res=>res.json())
.then(data=>{
const sort=document.getElementById("sortSelect").value;
if(currentUser==="farmer"){
if(sort==="newest"){data.sort((a,b)=>new Date(b.date)-new Date(a.date));}
else{data.sort((a,b)=>new Date(a.date)-new Date(b.date));}
}
const list=document.getElementById("orderList");
list.innerHTML="";
data.forEach((order,index)=>{
if(currentUser==="importer" && order.importer!==currentName) return;
if(currentUser==="farmer" && order.farmer!==currentName) return;

list.innerHTML+=`
<div class="card">
<h3>${order.crop}</h3>
<p>Quantity: ${order.quantity} kg</p>
<p>Status: ${order.status}</p>
<p>Date: ${new Date(order.date).toLocaleString()}</p>

${currentUser==="farmer"?`
<p>Ordered By: ${order.importer}</p>
<p>Address: ${order.house}, ${order.area||''}, ${order.street||''}, ${order.landmark||''}, ${order.pincode}</p>
<p>Phone: ${order.phone}</p>`:""}

${currentUser==="farmer"&&order.status==="Paid"?`<button class="action" onclick="deliverOrder(${index})">Deliver</button>`:""}
${currentUser==="importer"&&order.status==="Paid"?`<button class="delete" onclick="cancelOrder(${index})">Cancel</button>`:""}
${currentUser==="importer"&&order.status==="Delivered"&&!order.rating?`
<div class="stars">
<span onclick="rateOrder(${index},1)">⭐</span>
<span onclick="rateOrder(${index},2)">⭐</span>
<span onclick="rateOrder(${index},3)">⭐</span>
<span onclick="rateOrder(${index},4)">⭐</span>
<span onclick="rateOrder(${index},5)">⭐</span>
</div>`:""}
${order.rating?`<p>Rating: ${"⭐".repeat(order.rating)}</p>`:""}
</div>`;
});
});
}

function deliverOrder(index){
fetch('/deliver/'+index,{method:'POST'}).then(()=>loadOrders());
}

function cancelOrder(index){
fetch('/cancel/'+index,{method:'POST'}).then(()=>{loadOrders();loadCrops();});
}

function rateOrder(index,stars){
fetch('/rate/'+index,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({rating:stars})
}).then(()=>loadOrders());
}
</script>
</body>
</html>
