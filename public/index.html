<!DOCTYPE html>
<html>
<head>
<title>AgroBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to right,#e8f5e9,#f1f8e9);
min-height:100vh;
}

.navbar{
background:#1b5e20;
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.navbar h2{
font-weight:600;
}

.navbar button{
background:white;
color:#1b5e20;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.navbar button:hover{
transform:scale(1.05);
}

.auth-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.auth-card{
background:white;
padding:40px;
width:360px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
text-align:center;
animation:fadeIn 0.6s ease;
}

.auth-card h1{
margin-bottom:20px;
color:#1b5e20;
}

.auth-card input,.auth-card select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

.auth-card button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.auth-card button:hover{
transform:scale(1.03);
background:#1b5e20;
}

.dashboard{
display:none;
padding:40px;
animation:fadeIn 0.6s ease;
}

.section{
margin-top:30px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button.action{
background:#2e7d32;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button.action:hover{
transform:translateY(-2px);
}

button.delete{
background:#c62828;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-top:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.stars span{
cursor:pointer;
font-size:20px;
}

#popup{
position:fixed;
top:20px;
right:20px;
background:#2e7d32;
color:white;
padding:15px 20px;
border-radius:10px;
display:none;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div id="popup"></div>

<div class="auth-container" id="authPage">
<div class="auth-card">
<h1>AgroBridge</h1>
<input id="username" placeholder="Enter Your Name">
<select id="roleSelect">
<option value="">Select Role</option>
<option value="farmer">Farmer</option>
<option value="importer">Importer</option>
</select>
<button onclick="login()">Enter Marketplace</button>
</div>
</div>

<div class="dashboard" id="dashboard">

<div class="navbar">
<h2>AgroBridge Marketplace</h2>
<button onclick="logout()">Logout</button>
</div>

<div id="farmerSection" class="section" style="display:none;">
<h3>Add Crop</h3>
<input id="name" placeholder="Crop Name">
<input id="weight" placeholder="Weight (kg)">
<input id="price" placeholder="Price per kg">
<button class="action" onclick="addCrop()">Add Crop</button>
</div>

<div class="section">
<h3>Available Crops</h3>
<div id="cropList"></div>
</div>

<div id="orderForm" style="display:none;">
<h3>Place Order</h3>
<p id="selectedCrop"></p>
<input id="quantity" placeholder="Quantity (kg)">
<input id="house" placeholder="House No">
<input id="area" placeholder="Area">
<input id="street" placeholder="Street">
<input id="landmark" placeholder="Landmark">
<input id="pincode" placeholder="Pincode">
<input id="phone" placeholder="Phone">
<button class="action" onclick="confirmOrder()">Confirm Order</button>
</div>

<div class="section">
<h3>Orders</h3>

<select id="sortSelect" onchange="loadOrders()" style="margin-bottom:10px;">
<option value="newest">Newest First</option>
<option value="oldest">Oldest First</option>
</select>

<div id="orderList"></div>
</div>

</div>

<script>

let currentUser=null;
let currentName=null;
let selectedCropName=null;

function showPopup(message){
const popup=document.getElementById("popup");
popup.innerText=message;
popup.style.display="block";
setTimeout(()=>popup.style.display="none",3000);
}

function login(){
const name=document.getElementById("username").value.trim();
const role=document.getElementById("roleSelect").value;
if(!name||!role){showPopup("Fill all fields");return;}

currentUser=role;
currentName=name;

document.getElementById("authPage").style.display="none";
document.getElementById("dashboard").style.display="block";

if(role==="farmer"){
document.getElementById("farmerSection").style.display="block";
}

loadCrops();
loadOrders();
}

function logout(){location.reload();}

function addCrop(){
const name=document.getElementById("name").value;
const weight=document.getElementById("weight").value;
const price=document.getElementById("price").value;
if(!name||!weight||!price){showPopup("Fill all fields");return;}

fetch('/add-crop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({farmer:currentName,name,weight,price})})
.then(res=>res.json())
.then(data=>{showPopup(data.message);loadCrops();});
}

function deleteCrop(index){
fetch('/delete-crop/'+index,{method:'POST'})
.then(()=>{loadCrops();loadOrders();});
}

function loadCrops(){
fetch('/crops')
.then(res=>res.json())
.then(data=>{
const list=document.getElementById("cropList");
list.innerHTML="";
data.forEach((crop,index)=>{
list.innerHTML+=`
<div class="card">
<h3>${crop.name}</h3>
<p><strong>Farmer:</strong> ${crop.farmer}</p>
<p><strong>Weight:</strong> ${crop.weight} kg</p>
<p><strong>Price:</strong> ₹${crop.price}</p>
${currentUser==="importer"?`<button class="action" onclick="showOrderForm('${crop.name}')">Buy</button>`:""}
${currentUser==="farmer"?`<button class="delete" onclick="deleteCrop(${index})">Delete</button>`:""}
</div>`;
});
});
}

function showOrderForm(cropName){
selectedCropName=cropName;
document.getElementById("selectedCrop").innerText="Crop: "+cropName;
document.getElementById("orderForm").style.display="block";
}

function confirmOrder(){
const quantity=document.getElementById("quantity").value;
const house=document.getElementById("house").value;
const area=document.getElementById("area").value;
const street=document.getElementById("street").value;
const landmark=document.getElementById("landmark").value;
const pincode=document.getElementById("pincode").value;
const phone=document.getElementById("phone").value;

if(!quantity||quantity<=0){showPopup("Enter valid quantity");return;}
if(!house){showPopup("House required");return;}
if(!/^\d{6}$/.test(pincode)){showPopup("Pincode must be 6 digits");return;}
if(!/^\d{10}$/.test(phone)){showPopup("Phone must be 10 digits");return;}

fetch('/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({crop:selectedCropName,importer:currentName,quantity,house,area,street,landmark,pincode,phone})})
.then(res=>res.json())
.then(data=>{showPopup(data.message);document.getElementById("orderForm").style.display="none";loadOrders();});
}

function loadOrders(){
fetch('/orders')
.then(res=>res.json())
.then(data=>{

const sort=document.getElementById("sortSelect").value;
if(currentUser==="farmer"){
if(sort==="newest"){data.sort((a,b)=>new Date(b.date)-new Date(a.date));}
else{data.sort((a,b)=>new Date(a.date)-new Date(b.date));}
}

const list=document.getElementById("orderList");
list.innerHTML="";

data.forEach((order,index)=>{
if(currentUser==="importer"&&order.importer!==currentName)return;

list.innerHTML+=`
<div class="card">
<h3>${order.crop}</h3>
<p><strong>Quantity:</strong> ${order.quantity} kg</p>
<p><strong>Status:</strong> ${order.status}</p>
<p><strong>Date:</strong> ${new Date(order.date).toLocaleString()}</p>

${currentUser==="farmer"?`
<p><strong>Ordered By:</strong> ${order.importer}</p>
<p><strong>Address:</strong> ${order.house}, ${order.area||''}, ${order.street||''}, ${order.landmark||''}, ${order.pincode}</p>
<p><strong>Phone:</strong> ${order.phone}</p>
`:""}

${currentUser==="farmer"&&order.status==="Paid"?`<button class="action" onclick="deliverOrder(${index})">Deliver</button>`:""}

${currentUser==="importer"&&order.status==="Paid"?`<button class="delete" onclick="cancelOrder(${index})">Cancel</button>`:""}

${currentUser==="importer"&&order.status==="Delivered"&&!order.rating?`
<div class="stars">
<span onclick="rateOrder(${index},1)">⭐</span>
<span onclick="rateOrder(${index},2)">⭐</span>
<span onclick="rateOrder(${index},3)">⭐</span>
<span onclick="rateOrder(${index},4)">⭐</span>
<span onclick="rateOrder(${index},5)">⭐</span>
</div>`:""}

${order.rating?`<p><strong>Rating:</strong> ${"⭐".repeat(order.rating)}</p>`:""}
</div>`;
});
});
}

function deliverOrder(index){
fetch('/deliver/'+index,{method:'POST'}).then(()=>loadOrders());
}

function cancelOrder(index){
fetch('/cancel/'+index,{method:'POST'}).then(()=>loadOrders());
}

function rateOrder(index,stars){
fetch('/rate/'+index,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:stars})})
.then(()=>loadOrders());
}

</script>
</body>
</html>
