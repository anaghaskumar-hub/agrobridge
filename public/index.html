<!DOCTYPE html>
<html>
<head>
    <title>AgroBridge</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; padding:40px; }
        h1 { text-align:center; color:#2c7a2c; }
        .section { margin-top:30px; }
        input { padding:8px; margin:5px; width:250px; }
        button {
            padding:8px 12px;
            background:#2c7a2c;
            color:white;
            border:none;
            cursor:pointer;
            margin:5px;
        }
        button:hover { background:#256b25; }
        .card {
            background:white;
            padding:15px;
            margin-top:10px;
            border-radius:6px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }
        .stars span {
            cursor:pointer;
            font-size:22px;
        }
    </style>
</head>
<body>

<h1>AgroBridge - Direct Farmer to Importer Marketplace</h1>

<div class="section">
    <h2>Select Profile</h2>
    <input id="username" placeholder="Enter Your Name">
    <button onclick="login('farmer')">Farmer Login</button>
    <button onclick="login('importer')">Importer Login</button>
</div>

<div class="section" id="farmerSection" style="display:none;">
    <h2>Farmer Section</h2>
    <input id="name" placeholder="Crop Name">
    <input id="weight" placeholder="Weight (kg)">
    <input id="price" placeholder="Price per kg">
    <button onclick="addCrop()">Add Crop</button>
</div>

<div class="section" id="cropsSection" style="display:none;">
    <h2>Available Crops</h2>
    <div id="cropList"></div>
</div>

<div id="orderForm" style="display:none;">
    <h3>Place Order</h3>
    <p id="selectedCrop"></p>
    <input id="quantity" placeholder="Quantity (kg)">
    <input id="house" placeholder="House / Apartment No">
    <input id="area" placeholder="Area">
    <input id="street" placeholder="Street">
    <input id="landmark" placeholder="Landmark">
    <input id="pincode" placeholder="Pincode (6 digits)">
    <input id="phone" placeholder="10 Digit Phone Number">
    <button onclick="confirmOrder()">Confirm Order</button>
</div>

<div class="section" id="ordersSection" style="display:none;">
    <h2>Orders</h2>
    <div id="orderList"></div>
</div>

<script>

let currentUser=null;
let currentName=null;
let selectedCropName=null;

function login(role){
    const name=document.getElementById("username").value.trim();
    if(!name){ alert("Enter your name"); return; }

    currentUser=role;
    currentName=name;

    document.getElementById("farmerSection").style.display="none";
    document.getElementById("cropsSection").style.display="none";
    document.getElementById("ordersSection").style.display="none";

    if(role==="farmer"){
        document.getElementById("farmerSection").style.display="block";
        document.getElementById("cropsSection").style.display="block";
        document.getElementById("ordersSection").style.display="block";
    }

    if(role==="importer"){
        document.getElementById("cropsSection").style.display="block";
        document.getElementById("ordersSection").style.display="block";
    }

    loadCrops();
    loadOrders();
}

function addCrop(){
    const name=document.getElementById("name").value;
    const weight=document.getElementById("weight").value;
    const price=document.getElementById("price").value;

    if(!name||!weight||!price){ alert("Fill all fields"); return; }

    fetch('/add-crop',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({farmer:currentName,name,weight,price})
    })
    .then(res=>res.json())
    .then(data=>{ alert(data.message); loadCrops(); });
}

function deleteCrop(index){
    fetch('/delete-crop/'+index,{method:'POST'})
    .then(()=>{ loadCrops(); loadOrders(); });
}

function loadCrops(){
    fetch('/crops')
    .then(res=>res.json())
    .then(data=>{
        const list=document.getElementById("cropList");
        list.innerHTML="";
        data.forEach((crop,index)=>{
            list.innerHTML+=`
            <div class="card">
                <h3>${crop.name}</h3>
                <p>Farmer: ${crop.farmer}</p>
                <p>Weight: ${crop.weight} kg</p>
                <p>Price: ₹${crop.price}</p>
                ${currentUser==="importer"
                    ? `<button onclick="showOrderForm('${crop.name}')">Buy</button>`:""}
                ${currentUser==="farmer"
                    ? `<button onclick="deleteCrop(${index})" style="background:red;">Delete</button>`:""}
            </div>`;
        });
    });
}

function showOrderForm(cropName){
    selectedCropName=cropName;
    document.getElementById("selectedCrop").innerText="Crop: "+cropName;
    document.getElementById("orderForm").style.display="block";
}

function confirmOrder(){
    const quantity=document.getElementById("quantity").value;
    const house=document.getElementById("house").value;
    const area=document.getElementById("area").value;
    const street=document.getElementById("street").value;
    const landmark=document.getElementById("landmark").value;
    const pincode=document.getElementById("pincode").value;
    const phone=document.getElementById("phone").value;

    if(!quantity || quantity<=0){ alert("Enter valid quantity"); return; }
    if(!house){ alert("House required"); return; }
    if(!/^\d{6}$/.test(pincode)){ alert("Pincode must be 6 digits"); return; }
    if(!/^\d{10}$/.test(phone)){ alert("Phone must be 10 digits"); return; }

    fetch('/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            crop:selectedCropName,
            importer:currentName,
            quantity,
            house,area,street,landmark,pincode,phone
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        document.getElementById("orderForm").style.display="none";
        loadOrders();
    });
}

function loadOrders(){
    fetch('/orders')
    .then(res=>res.json())
    .then(data=>{
        const list=document.getElementById("orderList");
        list.innerHTML="";

        data.forEach((order,index)=>{

            if(currentUser==="importer" && order.importer!==currentName) return;

            list.innerHTML+=`
            <div class="card">
                <h3>${order.crop}</h3>
                <p>Quantity: ${order.quantity} kg</p>
                <p>Importer: ${order.importer}</p>
                <p>Address: ${order.house}, ${order.area}, ${order.street}, ${order.landmark}, ${order.pincode}</p>
                <p>Phone: ${order.phone}</p>
                <p>Status: ${order.status}</p>

                ${currentUser==="farmer" && order.status==="Paid"
                    ? `<button onclick="deliverOrder(${index})">Deliver</button>`:""}

                ${currentUser==="importer" && order.status==="Paid"
                    ? `<button onclick="cancelOrder(${index})" style="background:red;">Cancel</button>`:""}

                ${currentUser==="importer" && order.status==="Delivered" && !order.rating
                    ? `<div class="stars">
                        <span onclick="rateOrder(${index},1)">⭐</span>
                        <span onclick="rateOrder(${index},2)">⭐</span>
                        <span onclick="rateOrder(${index},3)">⭐</span>
                        <span onclick="rateOrder(${index},4)">⭐</span>
                        <span onclick="rateOrder(${index},5)">⭐</span>
                       </div>`:""}

                ${order.rating?`<p>Rating: ${"⭐".repeat(order.rating)}</p>`:""}
            </div>`;
        });
    });
}

function deliverOrder(index){
    fetch('/deliver/'+index,{method:'POST'})
    .then(()=>loadOrders());
}

function cancelOrder(index){
    fetch('/cancel/'+index,{method:'POST'})
    .then(()=>loadOrders());
}

function rateOrder(index,stars){
    fetch('/rate/'+index,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({rating:stars})
    })
    .then(()=>loadOrders());
}

</script>
</body>
</html>
